<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Lab | Brahmacharya Journey</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        lab: '#0B1220',
                        surface: '#111827',
                        royal: '#5B21B6',
                        spiritual: '#F59E0B',
                        soft: '#9CA3AF'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        serif: ['Merriweather', 'Georgia', 'serif'],
                    },
                    animation: {
                        breathe: 'breathe 8s infinite ease-in-out',
                    },
                    keyframes: {
                        breathe: {
                            '0%, 100%': { transform: 'scale(1)' },
                            '50%': { transform: 'scale(1.5)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Merriweather:ital,wght@0,300;0,400;1,300&display=swap');

        body {
            background: radial-gradient(circle at top center, #111827 0%, #0B1220 60%);
            color: #E5E7EB;
        }

        .glass-panel {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        .progress-ring__circle {
            transition: stroke-dashoffset 0.35s;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>

<body class="antialiased font-sans min-h-screen flex flex-col items-center pb-20">

<!-- NAVBAR -->
<nav class="w-full max-w-2xl px-6 pt-[env(safe-area-inset-top)] py-4 
flex justify-between items-center sticky top-0 
bg-lab/80 backdrop-blur-xl border-b border-white/5 z-10 mt-2">

    <div class="flex items-center gap-3">
        <div class="w-12 h-12 bg-royal/20 rounded-3xl flex items-center justify-center 
                    text-spiritual shadow-lg shadow-royal/30">
            <i class="fa-solid fa-om text-xl"></i>
        </div>
        <h1 class="text-xl font-bold tracking-tight text-white">Elite Lab</h1>
    </div>

    <button onclick="openSettings()" class="text-soft hover:text-white transition">
        <i class="fa-solid fa-gear text-lg"></i>
    </button>
</nav>


<!-- MAIN -->
<main class="w-full max-w-2xl px-4 flex flex-col gap-8 mt-6">

<!-- HERO -->
<section class="glass-panel rounded-3xl p-8 flex flex-col items-center relative overflow-hidden">
    <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-royal to-spiritual"></div>

    <h2 class="text-sm font-medium text-soft uppercase tracking-widest mb-6">
        Current Streak
    </h2>

    <div class="relative w-64 h-64 flex items-center justify-center">
        <svg class="absolute inset-0 w-full h-full" viewBox="0 0 120 120">
            <circle class="text-white/10 stroke-current" stroke-width="4"
                cx="60" cy="60" r="54" fill="transparent"></circle>

            <circle id="progressRing"
                class="text-spiritual stroke-current progress-ring__circle"
                stroke-width="4" stroke-linecap="round"
                cx="60" cy="60" r="54"
                fill="transparent"></circle>
        </svg>

        <div class="text-center z-10">
            <div class="text-6xl font-bold tracking-tighter text-white" id="daysCount">0</div>
            <div class="text-sm text-soft mt-1">Days</div>
        </div>
    </div>

    <div class="grid grid-cols-3 gap-6 mt-8 w-full max-w-sm text-center">
        <div>
            <div class="text-2xl font-semibold text-gray-300" id="hoursCount">00</div>
            <div class="text-xs text-soft uppercase tracking-wider">Hours</div>
        </div>
        <div>
            <div class="text-2xl font-semibold text-gray-300" id="minutesCount">00</div>
            <div class="text-xs text-soft uppercase tracking-wider">Minutes</div>
        </div>
        <div>
            <div class="text-2xl font-semibold text-gray-300" id="secondsCount">00</div>
            <div class="text-xs text-soft uppercase tracking-wider">Seconds</div>
        </div>
    </div>

    <div class="w-full mt-8 flex justify-center">
        <button onclick="openUrgeSurfer()"
            class="w-full bg-royal hover:bg-purple-700 text-white 
            font-semibold py-3 rounded-2xl transition 
            shadow-lg shadow-royal/40 flex justify-center items-center gap-2">

            <i class="fa-solid fa-fire text-spiritual"></i>
            Emergency Mode
        </button>
    </div>
</section>


<!-- QUOTE -->
<section class="glass-panel rounded-3xl p-8 relative">
    <i class="fa-solid fa-quote-left text-3xl text-royal/40 absolute top-6 left-6"></i>

    <div class="pl-8">
        <p id="dailyQuote"
            class="font-serif text-lg text-gray-200 leading-relaxed italic mb-4">
        </p>

        <p id="quoteAuthor"
            class="text-sm font-semibold text-spiritual uppercase tracking-wide">
        </p>
    </div>

    <button onclick="newQuote()" 
        class="absolute bottom-6 right-6 text-soft hover:text-white transition">
        <i class="fa-solid fa-rotate-right"></i>
    </button>
</section>

</main>


<!-- URGE MODAL -->
<div id="urgeModal"
    class="fixed inset-0 bg-lab/95 backdrop-blur-xl z-50 flex-col 
    items-center justify-center hidden opacity-0 transition-opacity duration-300">

    <button onclick="closeUrgeSurfer()"
        class="absolute top-6 right-6 text-soft hover:text-white text-2xl">
        <i class="fa-solid fa-xmark"></i>
    </button>

    <div class="text-center px-6 max-w-md mx-auto flex flex-col items-center">

        <h2 class="text-3xl font-bold text-white mb-4 font-serif">
            Ride the Wave
        </h2>

        <div class="relative w-48 h-48 flex items-center justify-center mb-12">
            <div class="absolute w-32 h-32 bg-spiritual/20 rounded-full animate-breathe blur-xl"></div>

            <div class="absolute w-24 h-24 bg-spiritual rounded-full
                shadow-[0_0_60px_rgba(245,158,11,0.6)]
                flex items-center justify-center z-10">
                <span id="breatheText" class="text-white font-medium">
                    Breathe In
                </span>
            </div>
        </div>

        <p class="text-gray-400 italic text-center">
            Observe. Do not react. Energy transforms when resisted consciously.
        </p>
    </div>
</div>


<script>
let journeyStart = new Date();
journeyStart.setDate(journeyStart.getDate() - 5);

const goalDays = 90;

function updateTimer() {
    const now = new Date();
    const diff = now - journeyStart;

    const days = Math.floor(diff / (1000*60*60*24));
    const hours = Math.floor((diff/(1000*60*60)) % 24);
    const minutes = Math.floor((diff/1000/60) % 60);
    const seconds = Math.floor((diff/1000) % 60);

    daysCount.innerText = days;
    hoursCount.innerText = String(hours).padStart(2,'0');
    minutesCount.innerText = String(minutes).padStart(2,'0');
    secondsCount.innerText = String(seconds).padStart(2,'0');

    updateProgress(days);
}

function updateProgress(days) {
    const circle = document.getElementById('progressRing');
    const radius = circle.r.baseVal.value;
    const circumference = radius * 2 * Math.PI;

    circle.style.strokeDasharray = circumference;
    const percent = Math.min((days/goalDays)*100,100);
    const offset = circumference - percent/100*circumference;
    circle.style.strokeDashoffset = offset;
}

setInterval(updateTimer,1000);
updateTimer();
</script>

</body>
</html>
